<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Catalog | Catálogo</title>
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/catalogo/style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/images/cine.png"
    />
  </head>
  <body>
    <!-- Barra de navegación -->
    <header class="navbar">
      <a href="../index.html" class="logo">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="28"
          height="28"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-popcorn"
        >
          <path
            d="M18 8a2 2 0 0 0 0-4 2 2 0 0 0-4 0 2 2 0 0 0-4 0 2 2 0 0 0-4 0 2 2 0 0 0 0 4"
          />
          <path d="M10 22 9 8" />
          <path d="m14 22 1-14" />
          <path
            d="M20 8c.5 0 .9.4.8 1l-2.6 12c-.1.5-.7 1-1.2 1H7c-.6 0-1.1-.4-1.2-1L3.2 9c-.1-.6.3-1 .8-1Z"
          />
        </svg>
        MovieApp
      </a>

      <nav>
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li>
            <a href="catalogo.html" class="active">Catálogo</a>
          </li>
          <li><button id="theme-toggle" class="btn-theme">☀️</button></li>
        </ul>
      </nav>
    </header>

    <!-- Contenido principal -->
    <main>
      <section class="catalog-controls">
        <h1 class="catalog-title">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-film-icon lucide-film"
          >
            <rect width="20" height="20" x="2" y="2" rx="2" />
            <path d="M7 3v18" />
            <path d="M3 7.5h4" />
            <path d="M3 12h18" />
            <path d="M3 16.5h4" />
            <path d="M17 3v18" />
            <path d="M17 7.5h4" />
            <path d="M17 16.5h4" />
          </svg>
          Nuestro Catálogo
        </h1>

        <div class="search-container">
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Buscar por título..."
            autocomplete="off"
          />
          <ul id="autocomplete-list" class="autocomplete-list"></ul>
        </div>

        <div class="container-filtros" id="botones-filtro">
          <button class="filtro-btn active" data-genero="Todos">Todos</button>
          <button class="filtro-btn" data-genero="Acción">Acción</button>
          <button class="filtro-btn" data-genero="Sci-Fi">Sci-Fi</button>
          <button class="filtro-btn" data-genero="Drama">Drama</button>
          <button class="filtro-btn" data-genero="Crimen">Crimen</button>
          <button class="filtro-btn" data-genero="Comedia">Comedia</button>
          <button class="filtro-btn" data-genero="Terror">Terror</button>
          <button class="filtro-btn" data-genero="Animación">Animación</button>
        </div>
      </section>

      <section class="movies-grid" id="movies-grid"></section>
    </main>

    <!-- Pie de página -->
    <footer>
      <p>&copy; 2026 Movie Catalog. Proyecto Interfaces.</p>
    </footer>
    <script src="../assets/js/main.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/js/movies.js"></script>
    <script src="../assets/js/catalogo-logica.js"></script>
  </body>
</html>
